<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="คณิตเร็ว">
<title>คณิตเร็ว ⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #09081a;
    --bg2: #14102e;
    --bg3: #1e1840;
    --surface: rgba(255,255,255,0.055);
    --surface-hi: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.09);
    --accent: #fbbf24;
    --accent-glow: rgba(251,191,36,0.35);
    --red: #f87171;
    --red-glow: rgba(248,113,113,0.3);
    --green: #34d399;
    --green-glow: rgba(52,211,153,0.3);
    --blue: #60a5fa;
    --purple: #a78bfa;
    --text: #f1f0ff;
    --muted: rgba(241,240,255,0.38);
    --r: 20px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg1);
    font-family: 'Kanit', sans-serif;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* animated bg */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139,92,246,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(59,130,246,0.14) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(251,191,36,0.06) 0%, transparent 70%),
      linear-gradient(160deg, #09081a 0%, #14102e 50%, #0d1526 100%);
    pointer-events: none;
  }

  /* ═══════ LAYOUT ═══════ */
  .app {
    position: relative; z-index: 1;
    width: 100dvw; height: 100dvh;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto 1fr;
    grid-template-areas: "topbar topbar" "left right";
    padding:
      env(safe-area-inset-top,12px)
      env(safe-area-inset-right,20px)
      env(safe-area-inset-bottom,12px)
      env(safe-area-inset-left,20px);
    gap: 0 16px;
  }

  /* ════════════════════════
     TOP BAR
  ════════════════════════ */
  .topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 10px;
  }

  .title {
    font-size: clamp(17px,2vw,22px);
    font-weight: 900;
    letter-spacing: -0.02em;
    white-space: nowrap;
    background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-right: 4px;
  }
  .title em { -webkit-text-fill-color: var(--accent); font-style:normal; }

  /* score bar */
  .scorebar {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 14px;
  }
  .sc-block { display:flex; flex-direction:column; align-items:center; min-width: 32px; }
  .sc-label { font-size: 8px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
  .sc-val { font-size: 16px; font-weight: 800; line-height:1; }
  .sc-val.g { color: var(--green); }
  .sc-val.r { color: var(--red); }
  .sc-sep { width: 1px; height: 22px; background: rgba(255,255,255,.10); }

  /* settings toggle */
  .settings-toggle {
    border: none; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 15px;
    width: 36px; height: 36px;
    cursor: pointer; flex-shrink: 0;
    transition: background .15s, transform .08s;
    display: flex; align-items:center; justify-content:center;
  }
  .settings-toggle:active { transform: scale(.9); }
  .settings-toggle.open { background: rgba(167,139,250,.2); border-color: var(--purple); color: var(--purple); }

  /* player chip */
  .player-chip {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 12px 5px 7px;
    cursor: pointer; transition: background .15s, transform .08s;
    white-space: nowrap; flex-shrink:0;
  }
  .player-chip:active { transform: scale(.94); }
  .player-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; font-weight: 800;
  }
  .player-chip-name { font-size: 12.5px; font-weight: 600; max-width:80px; overflow:hidden; text-overflow:ellipsis; }

  .icon-btn {
    border: none; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 16px;
    width: 36px; height: 36px;
    cursor: pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: background .15s, transform .08s;
  }
  .icon-btn:active { transform: scale(.9); }

  .topbar-right { display:flex; align-items:center; gap:8px; margin-left:auto; }

  /* ════════════════════════
     SETTINGS DRAWER
  ════════════════════════ */
  .settings-drawer {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: linear-gradient(180deg, rgba(14,11,32,0.98) 0%, rgba(18,14,40,0.96) 100%);
    border-bottom: 1px solid rgba(167,139,250,.2);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: env(safe-area-inset-top,16px) 20px 18px;
    z-index: 50;
    transform: translateY(-110%);
    transition: transform .3s cubic-bezier(.32,1.2,.6,1);
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
  }
  .settings-drawer.open { transform: translateY(0); }

  .drawer-title {
    font-size: 11px; font-weight:700; color:var(--purple);
    text-transform:uppercase; letter-spacing:.12em;
    padding-bottom: 12px;
  }

  .drawer-row {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 8px 12px;
    padding: 8px 0;
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .drawer-row:first-of-type { border-top: none; }

  .drawer-label {
    font-size: 11px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.08em;
    min-width: 56px;
  }

  /* pill group */
  .pillgroup {
    display: flex;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 3px;
  }
  .pill-btn {
    border: none; border-radius: 999px;
    padding: 5px 13px;
    font-family: 'Kanit', sans-serif;
    font-size: 12px; font-weight: 700;
    color: var(--muted);
    background: transparent;
    cursor: pointer;
    transition: background .18s, color .18s, transform .07s;
    white-space: nowrap;
  }
  .pill-btn:active { transform: scale(.93); }
  .pill-btn.on-mode { background: var(--accent); color: #3a2600; box-shadow: 0 0 10px var(--accent-glow); }
  .pill-btn.on-diff { background: var(--purple); color: #1a0a2e; box-shadow: 0 0 10px rgba(167,139,250,.35); }
  .pill-btn.on-op   { background: var(--green);  color: #032e1a; box-shadow: 0 0 10px var(--green-glow); }
  .pill-btn.on-time { background: var(--blue);   color: #001433; box-shadow: 0 0 10px rgba(96,165,250,.35); }

  .drawer-actions {
    display:flex; gap:8px; flex-wrap:wrap;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .drawer-action-btn {
    border: none; border-radius: 12px;
    padding: 8px 16px;
    font-family: 'Kanit', sans-serif; font-size: 12.5px; font-weight: 700;
    cursor: pointer;
    transition: transform .08s, opacity .1s;
  }
  .drawer-action-btn:active { transform: scale(.94); opacity:.85; }
  .da-reset  { background: rgba(248,113,113,.15); border:1px solid rgba(248,113,113,.3); color:var(--red); }
  .da-custom { background: rgba(96,165,250,.15);  border:1px solid rgba(96,165,250,.3);  color:var(--blue); }

  /* custom time input row */
  .custom-time-row {
    display: none; align-items:center; gap:8px;
    padding-top: 8px;
  }
  .custom-time-row.visible { display:flex; }
  .custom-time-row input {
    width: 66px;
    background: var(--surface); border:1px solid rgba(255,255,255,.18);
    border-radius:10px; color:var(--text);
    font-family:'Kanit',sans-serif; font-size:14px;
    padding: 6px 10px; text-align:center;
  }
  .custom-time-row label { font-size:12px; color:var(--muted); }
  .custom-time-row button {
    border:none; border-radius:10px; padding:7px 14px;
    background:var(--blue); color:#001433;
    font-family:'Kanit',sans-serif; font-size:12.5px; font-weight:700; cursor:pointer;
  }

  /* overlay backdrop when drawer open */
  .drawer-backdrop {
    display: none;
    position: fixed; inset: 0; z-index: 49;
    background: rgba(0,0,0,.4);
  }
  .drawer-backdrop.visible { display:block; }

  /* ════════════════════════
     COUNTDOWN BAR
  ════════════════════════ */
  .cd-wrap {
    width: 100%; max-width: 540px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 10px 18px;
    display: none;
    align-items: center; gap: 12px;
  }
  .cd-wrap.show { display: flex; }

  .cd-label { font-size: 10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; white-space:nowrap; }
  .cd-bar-wrap { flex:1; height: 6px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; }
  .cd-bar {
    height:100%; width:100%;
    background: linear-gradient(90deg, var(--green), var(--accent));
    border-radius:99px;
    transition: width 1s linear, background .4s;
  }
  .cd-bar.warn   { background: linear-gradient(90deg, var(--accent), var(--red)); }
  .cd-bar.danger { background: var(--red); }
  .cd-time {
    font-size: 22px; font-weight: 800;
    font-variant-numeric: tabular-nums;
    min-width: 58px; text-align:right;
    transition: color .3s;
  }
  .cd-time.danger { color: var(--red); }
  .cd-playbtn {
    border: none; border-radius: 12px; padding: 8px 16px;
    font-family:'Kanit',sans-serif; font-weight:700; font-size:13px;
    cursor:pointer; white-space:nowrap;
    background: var(--green); color:#032e1a;
    transition: background .15s, transform .08s;
    box-shadow: 0 0 14px var(--green-glow);
  }
  .cd-playbtn:active { transform: scale(.93); }
  .cd-playbtn.running { background: var(--red); color:#3a0000; box-shadow: 0 0 14px var(--red-glow); }

  /* ════════════════════════
     LEFT PANEL
  ════════════════════════ */
  .left {
    grid-area: left;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; min-height: 0;
  }

  /* ════════════════════════
     QUESTION CARD
  ════════════════════════ */
  .card {
    width: 100%; max-width: 500px;
    background: linear-gradient(145deg, rgba(255,255,255,.07) 0%, rgba(255,255,255,.03) 100%);
    border: 1px solid rgba(255,255,255,.11);
    border-radius: 32px;
    padding: clamp(20px,3vh,34px) 36px clamp(16px,2.5vh,26px);
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: relative; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset,
                0 20px 50px rgba(0,0,0,.35);
  }

  /* top glow accent */
  .card::before {
    content: ''; position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 50% at 50% -5%,
      rgba(251,191,36,.10) 0%, transparent 70%);
    pointer-events:none;
  }

  /* animated ring when correct */
  .card::after {
    content: ''; position:absolute; inset:-2px;
    border-radius: 34px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }
  .card.flash-correct::after { animation: ringGreen .5s ease; }
  .card.flash-wrong::after   { animation: ringRed   .5s ease; }

  @keyframes ringGreen {
    0%  { opacity:1; box-shadow:0 0 0 3px var(--green),  0 0 30px var(--green-glow); }
    100%{ opacity:0; box-shadow:0 0 0 8px transparent,    0 0 0px transparent; }
  }
  @keyframes ringRed {
    0%  { opacity:1; box-shadow:0 0 0 3px var(--red), 0 0 30px var(--red-glow); }
    100%{ opacity:0; box-shadow:0 0 0 8px transparent, 0 0 0px transparent; }
  }

  .equation { display:flex; align-items:center; gap: clamp(12px,2.2vw,32px); }

  .num {
    font-size: clamp(52px,8vw,96px);
    font-weight: 900; line-height: 1;
    min-width: 1.5ch; text-align:center;
    background: linear-gradient(160deg, #fff 30%, rgba(255,255,255,.6) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .num.pop { animation: pop .2s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop {
    0%  { transform:scale(.5); opacity:0; }
    100%{ transform:scale(1);  opacity:1; }
  }

  .op {
    font-size: clamp(32px,4.8vw,58px);
    font-weight: 300; line-height:1;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent-glow);
  }

  .divider {
    width: 72%; height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
  }

  .answer-zone {
    min-height: clamp(44px,5.5vw,64px);
    display:flex; align-items:center; justify-content:center;
  }
  .answer-text {
    font-size: clamp(38px,5.5vw,60px); font-weight:800;
    color: var(--accent);
    opacity:0; transform:translateY(8px) scale(.9);
    transition: opacity .25s, transform .25s, color .2s;
  }
  .answer-text.visible { opacity:1; transform:translateY(0) scale(1); }
  .answer-placeholder {
    font-size: clamp(18px,2.4vw,26px); font-weight:300;
    color: var(--muted); letter-spacing:.08em;
  }

  .result-badge {
    font-size: 13px; font-weight: 700; padding: 4px 16px;
    border-radius:999px; opacity:0; transition:opacity .35s;
    min-height: 24px; letter-spacing:.02em;
  }
  .result-badge.correct { background:rgba(52,211,153,.18); color:var(--green); opacity:1;
    box-shadow: 0 0 12px rgba(52,211,153,.2); }
  .result-badge.wrong   { background:rgba(248,113,113,.15); color:var(--red);   opacity:1;
    box-shadow: 0 0 12px rgba(248,113,113,.2); }
  .result-badge.reveal  { background:rgba(251,191,36,.14);  color:var(--accent);opacity:1; }

  .streak {
    font-size: 12px; font-weight:700;
    color: var(--accent); letter-spacing:.05em;
    min-height: 16px;
    text-shadow: 0 0 10px var(--accent-glow);
  }

  /* ════════════════════════
     CHOICE BUTTONS
  ════════════════════════ */
  .choice-row { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:4px; }

  .choice-btn {
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 22px;
    background: linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
    color: var(--text);
    font-family: 'Kanit', sans-serif;
    font-size: clamp(34px,5.5vw,52px); font-weight: 800;
    padding: clamp(18px,3vh,30px) 0;
    cursor: pointer;
    transition: transform .09s, background .15s, border-color .15s, box-shadow .15s;
    -webkit-user-select:none; user-select:none;
  }
  .choice-btn:active { transform: scale(.94); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.choice-correct {
    background: rgba(52,211,153,.18); border-color: var(--green);
    color: var(--green); box-shadow: 0 0 20px var(--green-glow);
  }
  .choice-btn.choice-wrong {
    background: rgba(248,113,113,.15); border-color: var(--red);
    color: var(--red); box-shadow: 0 0 16px var(--red-glow);
  }
  .choice-btn.choice-dim { opacity: .28; }

  /* ════════════════════════
     BATCH / 10-QUESTION SHEET
  ════════════════════════ */
  .sheet-wrap {
    width:100%; max-width:540px;
    display:none; flex-direction:column;
    gap:8px; min-height:0; flex:1;
    position:relative;
  }
  .sheet-wrap.visible { display:flex; }

  .sheet-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 2px;
  }
  .sheet-progress { font-size:12px; font-weight:700; color:var(--muted); white-space:nowrap; }
  .sheet-progress span { color:var(--text); }
  .prog-bar-wrap { flex:1; height:5px; background:rgba(255,255,255,.07); border-radius:99px; margin:0 12px; overflow:hidden; }
  .prog-bar { height:100%; width:0; background:linear-gradient(90deg,var(--green),var(--accent)); border-radius:99px; transition:width .35s; }

  .sheet-list { flex:1; display:flex; flex-direction:column; gap:5px; overflow-y:auto; padding-right:4px; }
  .sheet-list::-webkit-scrollbar { width:3px; }
  .sheet-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:3px; }

  .q-row {
    display:grid; grid-template-columns:24px 1fr auto;
    align-items:center; gap:8px;
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:12px; padding:7px 12px;
    transition:border-color .2s, background .2s;
  }
  .q-row.active-row { border-color:rgba(251,191,36,.5); background:rgba(251,191,36,.06); }
  .q-row.done-correct { border-color:rgba(52,211,153,.3); background:rgba(52,211,153,.05); }
  .q-row.done-wrong   { border-color:rgba(248,113,113,.3); background:rgba(248,113,113,.05); }

  .q-num { font-size:11.5px; font-weight:700; color:var(--muted); text-align:right; }
  .q-num.active-num { color:var(--accent); }
  .q-eq { font-size:clamp(14px,1.9vw,19px); font-weight:700; }
  .q-eq .q-blank { display:inline-block; min-width:30px; border-bottom:2px solid rgba(255,255,255,.2); text-align:center; margin-left:4px; color:var(--muted); font-weight:400; }
  .q-eq .q-blank.filled { color:var(--text); border-color:var(--accent); }
  .q-eq .q-blank.correct-ans { color:var(--green); border-color:var(--green); }
  .q-eq .q-blank.wrong-ans   { color:var(--red);   border-color:var(--red); }
  .q-icon { font-size:15px; min-width:18px; text-align:center; }

  /* summary */
  .summary {
    display:none; position:absolute; inset:0;
    background:rgba(9,8,26,.94);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; z-index:10; border-radius:24px;
  }
  .summary.visible { display:flex; }
  .sum-title { font-size:26px; font-weight:800; }
  .sum-score { font-size:52px; font-weight:900; line-height:1; }
  .sum-score .sum-c { color:var(--green); text-shadow:0 0 20px var(--green-glow); }
  .sum-score .sum-w { color:var(--red); }
  .sum-time { font-size:17px; font-weight:600; color:var(--blue); }
  .sum-msg { font-size:14px; color:var(--muted); }
  .sum-again {
    border:none; border-radius:16px; padding:11px 32px;
    background:var(--accent); color:#3a2600;
    font-family:'Kanit',sans-serif; font-size:16px; font-weight:800;
    cursor:pointer; transition:transform .08s;
    box-shadow:0 0 20px var(--accent-glow);
  }
  .sum-again:active { transform:scale(.94); }

  /* ════════════════════════
     RIGHT PANEL — NUMPAD
  ════════════════════════ */
  .right {
    grid-area: right;
    display: flex; flex-direction: column;
    gap: 10px; justify-content: center;
  }

  .numpad {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 8px; align-content: center; flex:1;
  }

  .key {
    background: linear-gradient(160deg, rgba(255,255,255,.09) 0%, rgba(255,255,255,.04) 100%);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    padding: clamp(11px,1.8vh,20px) 0;
    font-family:'Kanit',sans-serif;
    font-size: clamp(20px,2.5vh,30px); font-weight: 800;
    color: var(--text); cursor:pointer;
    transition: background .1s, transform .07s, box-shadow .1s;
    -webkit-user-select:none; user-select:none;
    box-shadow: 0 2px 8px rgba(0,0,0,.25), 0 1px 0 rgba(255,255,255,.08) inset;
  }
  .key:active {
    transform: scale(.91) translateY(1px);
    background: rgba(255,255,255,.12);
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }

  .key.action {
    background: linear-gradient(145deg, rgba(251,191,36,.25), rgba(251,191,36,.12));
    border-color: rgba(251,191,36,.4);
    color: var(--accent);
    box-shadow: 0 0 14px rgba(251,191,36,.15), 0 2px 8px rgba(0,0,0,.25);
  }
  .key.action:active { background: rgba(251,191,36,.3); }

  .key.del {

<script>
/* ═══════════════════════════════════════
   GLOBAL STATE
═══════════════════════════════════════ */
let qMode = 'A';          // 'A' single | 'B' batch10
let difficulty = 'normal'; // 'normal' | 'hard'
let input = '';

let operator = 'add'; // 'add'|'sub'|'mul'|'div'|'mix'

function setOperator(op) {
  operator = op;
  document.querySelectorAll('#opGroup .pill-btn').forEach(b=>b.classList.toggle('on-op', b.dataset.op===op));
  if (qMode === 'A') generate();
  else if (qMode === 'B') batchGenerate();
  else choiceGenerate();
}

/* returns the actual operator for this question (resolves 'mix') */
function pickOp() {
  if (operator !== 'mix') return operator;
  return ['add','sub','mul','div'][Math.floor(Math.random()*4)];
}

/* generate one number based on role and operator */
function randNum(role, op) {
  // role: 'a' or 'b'
  const hard = difficulty === 'hard';
  if (op === 'mul' || op === 'div') {
    return hard ? Math.floor(Math.random()*12)+1 : Math.floor(Math.random()*10)+1;
  }
  // add / sub
  return hard ? Math.floor(Math.random()*50)+1 : Math.floor(Math.random()*10);
}

/* returns {a, b, op, right, sym, displayA, displayB}
   for division: displayA is the product (dividend), displayB is the divisor */
function makeQuestion() {
  const op = pickOp();
  let a, b, right, sym, displayA, displayB;

  if (op === 'add') {
    a = randNum('a', op); b = randNum('b', op);
    right = a + b; sym = '+'; displayA = a; displayB = b;
  } else if (op === 'sub') {
    a = randNum('a', op); b = randNum('b', op);
    // ensure a >= b so result is non-negative
    if (a < b) [a, b] = [b, a];
    right = a - b; sym = '−'; displayA = a; displayB = b;
  } else if (op === 'mul') {
    a = randNum('a', op); b = randNum('b', op);
    right = a * b; sym = '×'; displayA = a; displayB = b;
  } else { // div — generate as b × a, show product ÷ b
    a = randNum('a', op); b = randNum('b', op);
    const product = a * b;
    right = a;           // answer is a
    sym = '÷'; displayA = product; displayB = b;
  }
  return { a, b, op, right, sym, displayA, displayB };
}

/* max digits for input box based on operator */
function maxInputLen() {
  if (operator === 'mul' || operator === 'mix') return 3; // up to 12×12=144
  return difficulty === 'hard' ? 3 : 2;
}

function pressRaw(n) {
  const maxLen = maxInputLen();
  if (input.length >= maxLen) return;
  if (input === '0') input = '';
  input += n;
}
function delRaw() { input = input.slice(0, -1); }

/* ═══════════════════════════════════════
   SINGLE MODE
═══════════════════════════════════════ */
let a = 0, b = 0, answered = false, streak = 0;
let currentQ = null; // stores {a,b,op,right,sym,displayA,displayB}

const num1El      = document.getElementById('num1');
const num2El      = document.getElementById('num2');
const opSymbolEl  = document.getElementById('opSymbol');
const answerText  = document.getElementById('answerText');
const answerPH    = document.getElementById('answerPH');
const resultBadge = document.getElementById('resultBadge');
const streakEl    = document.getElementById('streak');
const cardEl      = document.getElementById('card');

function generate() {
  answered = false; input = '';
  currentQ = makeQuestion();
  a = currentQ.displayA; b = currentQ.displayB;
  [num1El, num2El].forEach(el => { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); });
  num1El.textContent = currentQ.displayA;
  opSymbolEl.textContent = currentQ.sym;
  num2El.textContent = currentQ.displayB;
  answerText.textContent = ''; answerText.classList.remove('visible');
  answerPH.style.display = '';
  resultBadge.className = 'result-badge'; resultBadge.textContent = '';
  cardEl.className = 'card'; streakEl.textContent = '';
}

function updateInputA() {
  if (input === '') { answerText.classList.remove('visible'); answerPH.style.display = ''; }
  else { answerPH.style.display='none'; answerText.textContent=input; answerText.style.color='var(--text)'; answerText.classList.add('visible'); }
}

function confirmA() {
  if (answered || input === '') return;
  const guess = parseInt(input,10), right = currentQ.right;
  answered = true;
  if (guess === right) {
    streak++;
    addScore(1,0);
    sfxCorrect();
    resultBadge.className='result-badge correct'; resultBadge.textContent='✓ ถูกต้อง!';
    cardEl.className='card flash-correct'; answerText.style.color='var(--green)';
    streakEl.textContent = streak>1 ? `🔥 ${streak} ครั้งติด!` : '';
  } else {
    if (streak > 0) recordSingleStreak(streak, true);
    streak = 0;
    addScore(0,1);
    sfxWrong();

    cardEl.className='card flash-wrong'; answerText.style.color='var(--accent2)';
    streakEl.textContent='';
  }
  answerText.textContent = guess===right ? guess : `${guess}  →  ${right}`;
  answerText.classList.add('visible'); answerPH.style.display='none';

  // In timed mode, immediately roll the next question
  if (timerTotal > 0 && cdRunning) {
    setTimeout(generate, 350);
  }
}

function showAnswer() {
  if (answered) return;
  answered = true; streak = 0; addScore(0,1);
  const right = currentQ.right;

}

/* ═══════════════════════════════════════
   CHOICE MODE (2-option)
═══════════════════════════════════════ */
let cA = 0, cB = 0, cAnswered = false, cStreak = 0, cCorrectIdx = 0;

let cCurrentQ = null;

const cNum1El   = document.getElementById('cNum1');
const cNum2El   = document.getElementById('cNum2');
const cOpSymbolEl = document.getElementById('cOpSymbol');
const cardCEl   = document.getElementById('cardC');
const resultBadgeC = document.getElementById('resultBadgeC');
const streakCEl = document.getElementById('streakC');
const choiceBtns = [document.getElementById('choiceBtn0'), document.getElementById('choiceBtn1')];

function choiceGenerate() {
  cAnswered = false;
  cCurrentQ = makeQuestion();
  const right = cCurrentQ.right;

  // plausible distractor: close delta, never negative
  const maxVal = cCurrentQ.op === 'mul' ? (difficulty === 'hard' ? 144 : 100)
               : cCurrentQ.op === 'div' ? (difficulty === 'hard' ? 12 : 10)
               : (difficulty === 'hard' ? 100 : 18);
  let wrong, tries = 0;
  do {
    const delta = [1,1,2,2,-1,-1,-2,-2,3,-3][Math.floor(Math.random()*10)];
    wrong = right + delta;
    tries++;
  } while ((wrong === right || wrong < 1 || wrong > maxVal) && tries < 30);
  if (wrong === right || wrong < 1) wrong = right + (right > 1 ? -1 : 1);

  cCorrectIdx = Math.random() < 0.5 ? 0 : 1;
  const values = cCorrectIdx === 0 ? [right, wrong] : [wrong, right];

  [cNum1El, cNum2El].forEach(el => { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); });
  cNum1El.textContent = cCurrentQ.displayA;
  cOpSymbolEl.textContent = cCurrentQ.sym;
  cNum2El.textContent = cCurrentQ.displayB;

  choiceBtns.forEach((btn, i) => {
    btn.textContent = values[i];
    btn.className = 'choice-btn';
    btn.disabled = false;
  });

  resultBadgeC.className = 'result-badge'; resultBadgeC.textContent = '';
  cardCEl.className = 'card'; streakCEl.textContent = '';
}

function choosePick(idx) {
  if (cAnswered) return;
  cAnswered = true;
  const right = cCurrentQ.right;
  const isCorrect = idx === cCorrectIdx;

  choiceBtns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === cCorrectIdx) btn.classList.add('choice-correct');
    else if (i === idx) btn.classList.add('choice-wrong');
    else btn.classList.add('choice-dim');
  });

  if (isCorrect) {
    cStreak++;
    addScore(1,0);
    sfxCorrect();
    resultBadgeC.className = 'result-badge correct'; resultBadgeC.textContent = '✓ ถูกต้อง!';
    cardCEl.className = 'card flash-correct';
    streakCEl.textContent = cStreak>1 ? `🔥 ${cStreak} ครั้งติด!` : '';
  } else {
    if (cStreak > 0) recordChoiceStreak(cStreak, true);
    cStreak = 0;
    addScore(0,1);
    sfxWrong();
    resultBadgeC.className = 'result-badge wrong'; resultBadgeC.textContent = `✗ ผิด! คำตอบคือ ${right}`;
    cardCEl.className = 'card flash-wrong';
    streakCEl.textContent = '';
  }

  if (timerTotal > 0 && cdRunning) {
    setTimeout(choiceGenerate, 450);
  }
}

function recordChoiceStreak(streakVal, ended) {
  if (!ended || streakVal < 1) return;
  const records = loadRecords();
  records.push({
    type: 'choice',
    difficulty: difficulty,
    streak: streakVal,
    timed: timerTotal > 0,
    playerId: activePlayerId,
    date: new Date().toISOString()
  });
  saveRecords(records);
}

/* ═══════════════════════════════════════
   BATCH-10 MODE
═══════════════════════════════════════ */
const BATCH = 10;
let questions = [], answers = [], batchIdx = 0, batchDone = false;

function batchGenerate() {
  document.getElementById('summary').classList.remove('visible');
  batchDone = false;
  questions = Array.from({length:BATCH}, () => makeQuestion());
  answers = Array(BATCH).fill(null);
  batchIdx = 0;
  input = '';
  renderSheet();
}

function renderSheet() {
  const list = document.getElementById('sheetList');
  list.innerHTML = '';
  questions.forEach((q, i) => {
    const ans = answers[i];
    const right = q.right;
    const done = ans !== null;
    const ok = done && ans === right;

    const row = document.createElement('div');
    row.className = 'q-row' +
      (i === batchIdx && !batchDone ? ' active-row' : '') +
      (done && ok ? ' done-correct' : '') +
      (done && !ok ? ' done-wrong' : '');
    row.id = `qrow-${i}`;

    const qn = document.createElement('div');
    qn.className = 'q-num' + (i===batchIdx&&!batchDone?' active-num':'');
    qn.textContent = i+1;

    const eq = document.createElement('div');
    eq.className = 'q-eq';
    let blankClass = 'q-blank';
    let blankVal = '?';
    if (done) {
      blankClass += ok ? ' correct-ans' : ' wrong-ans';
      blankVal = ok ? ans : (ans===-1 ? right : `${ans}→${right}`);
    } else if (i === batchIdx && !batchDone && input !== '') {
      blankClass += ' filled';
      blankVal = input;
    }
    eq.innerHTML = `${q.displayA} ${q.sym} ${q.displayB} = <span class="${blankClass}">${blankVal}</span>`;

    const ic = document.createElement('div');
    ic.className = 'q-icon';
    ic.textContent = done ? (ok ? '✅' : '❌') : (i===batchIdx&&!batchDone ? '✏️' : '');

    row.append(qn, eq, ic);
    list.appendChild(row);
  });

  const doneCount = answers.filter(x=>x!==null).length;
  const timedExtend = timerTotal > 0 && cdRunning;
  document.getElementById('sheetCur').textContent = Math.min(batchIdx+1, questions.length);
  document.getElementById('sheetTotal').textContent = timedExtend ? '∞' : BATCH;
  document.getElementById('progBar').style.width = (timedExtend ? 100 : (doneCount/BATCH*100))+'%';
  const c = answers.filter((x,i)=> x!==null && x===questions[i].right).length;
  const w = answers.filter((x,i)=> x!==null && x!==questions[i].right).length;
  document.getElementById('sheetScore').innerHTML = `✓ ${c} &nbsp; ✗ ${w}`;

  const activeRow = document.getElementById(`qrow-${batchIdx}`);
  if (activeRow) activeRow.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function confirmB() {
  if (batchDone || input === '') return;
  const guess = parseInt(input,10);
  const right = questions[batchIdx].right;
  answers[batchIdx] = guess;
  addScore(guess===right?1:0, guess===right?0:1);
  input = '';
  advanceBatch();
}

function batchReveal() {
  if (batchDone || answers[batchIdx] !== null) return;
  answers[batchIdx] = -1;
  addScore(0,1);
  input = '';
  advanceBatch();
}

function advanceBatch() {
  // Timed mode: keep extending with fresh questions instead of stopping at 10
  if (timerTotal > 0 && cdRunning) {
    questions.push(makeQuestion());
    answers.push(null);
    batchIdx++;
    renderSheet();
    return;
  }
  if (batchIdx < BATCH-1) { batchIdx++; renderSheet(); }
  else { batchDone = true; renderSheet(); showSummary('done'); }
}

function showSummary(reason) {
  const c = answers.filter((x,i)=> x!==null && x===questions[i].right).length;
  const answeredCount = answers.filter(x=>x!==null).length;
  const w = answeredCount - c;
  document.getElementById('sumC').textContent = c;
  document.getElementById('sumW').textContent = w;
  document.getElementById('sumTitle').textContent = reason==='timeup' ? '⏰ หมดเวลา!' : '🎉 จบแล้ว!';
  const msgs = ['ลองใหม่อีกครั้งนะ 💪','พยายามต่อไป! 🌟','ดีขึ้นเรื่อยๆ 😊','เก่งมาก! 🎯','เยี่ยมเลย! 🔥','เพอร์เฟค! ⭐️'];
  document.getElementById('sumMsg').textContent = msgs[Math.min(Math.floor(c/2), msgs.length-1)];
  let timeUsed = null;
  if (timerTotal > 0) {
    timeUsed = timerTotal - timeLeft;
    document.getElementById('sumTime').textContent = '⏱ เวลาที่ใช้ ' + fmtMMSS(timeUsed);
  } else {
    document.getElementById('sumTime').textContent = '';
  }
  document.getElementById('summary').classList.add('visible');

  recordBatchResult({
    correct: c,
    wrong: w,
    total: answeredCount,
    timed: timerTotal > 0,
    timeUsed: timeUsed,
    timerTotal: timerTotal,
    extended: questions.length > BATCH
  });
}

/* ═══════════════════════════════════════
   UNIFIED INPUT ROUTING
═══════════════════════════════════════ */
function press(n) {
  if (timerTotal > 0 && !cdRunning && timeLeft <= 0) return; // time's up, locked
  if (qMode === 'A') { if (answered) return; pressRaw(n); updateInputA(); }
  else if (qMode === 'B') { if (batchDone || answers[batchIdx]!==null) return; pressRaw(n); renderSheet(); }
  // mode C ignores numpad/digit input entirely
}
function del() {
  if (qMode === 'A') { if (answered) return; delRaw(); updateInputA(); }
  else if (qMode === 'B') { if (batchDone || answers[batchIdx]!==null) return; delRaw(); renderSheet(); }
}
function confirm_() {
  if (timerTotal > 0 && !cdRunning && timeLeft <= 0) return;
  if (qMode === 'A') confirmA();
  else if (qMode === 'B') confirmB();
}

document.addEventListener('keydown', e => {
  if (qMode === 'C') {
    if (e.key === 'ArrowLeft' || e.key === '1') choosePick(0);
    else if (e.key === 'ArrowRight' || e.key === '2') choosePick(1);
    else if (e.key === ' ') choiceGenerate();
    return;
  }
  if (e.key>='0'&&e.key<='9') press(parseInt(e.key));
  else if (e.key==='Backspace') del();
  else if (e.key==='Enter') confirm_();
  else if (e.key===' ') { if(qMode==='A') generate(); else batchGenerate(); }
});

/* ═══════════════════════════════════════
   AUDIO ENGINE  (Web Audio API — no external files)
   สไตล์: เร่งเร้า / countdown
═══════════════════════════════════════ */
let audioCtx = null;
let bgLoopNode = null;        // ScriptProcessor for background loop
let bgLoopRunning = false;
let bgLoopPhase = 0;          // beat counter for the loop
let bgLoopInterval = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // resume if suspended (iOS requires user gesture first)
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

/* ── master gain (lets us fade out) ── */
let masterGain = null;
function getMasterGain() {
  const ctx = getAudioCtx();
  if (!masterGain) {
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.55;
    masterGain.connect(ctx.destination);
  }
  return masterGain;
}

/* ── play a single tone ──
   type: 'sine'|'square'|'sawtooth'|'triangle'
   freq: Hz, dur: seconds, vol: 0-1,
   attack/release: seconds */
function playTone(freq, dur, vol=0.4, type='square', attack=0.01, release=0.08) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
  g.gain.setValueAtTime(vol, ctx.currentTime + dur - release);
  g.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
  osc.connect(g);
  g.connect(getMasterGain());
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + dur);
}

/* ── start-button effect: ascending 3-note fanfare ── */
function sfxStart() {
  playTone(440, 0.10, 0.35, 'square', 0.005, 0.05);
  playTone(554, 0.10, 0.35, 'square', 0.005, 0.05);
  // schedule with AudioContext for precise timing
  const ctx = getAudioCtx();
  const mg  = getMasterGain();
  [660, 880].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g2  = ctx.createGain();
    const t   = ctx.currentTime + 0.10 * (i + 1);
    osc.type = 'square';
    osc.frequency.setValueAtTime(f, t);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.38, t + 0.008);
    g2.gain.linearRampToValueAtTime(0, t + 0.12);
    osc.connect(g2); g2.connect(mg);
    osc.start(t); osc.stop(t + 0.14);
  });
}

/* ── stop/pause effect: descending blip ── */
function sfxStop() {
  playTone(440, 0.09, 0.28, 'square', 0.005, 0.06);
  const ctx = getAudioCtx();
  const mg  = getMasterGain();
  const osc = ctx.createOscillator();
  const g2  = ctx.createGain();
  const t   = ctx.currentTime + 0.08;
  osc.type = 'square';
  osc.frequency.setValueAtTime(330, t);
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.28, t + 0.006);
  g2.gain.linearRampToValueAtTime(0, t + 0.10);
  osc.connect(g2); g2.connect(mg);
  osc.start(t); osc.stop(t + 0.12);
}

/* ── correct answer chime ── */
function sfxCorrect() {
  [523, 659, 784].forEach((f, i) => {
    const ctx = getAudioCtx();
    const mg  = getMasterGain();
    const osc = ctx.createOscillator();
    const g2  = ctx.createGain();
    const t   = ctx.currentTime + i * 0.07;
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f, t);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.32, t + 0.01);
    g2.gain.linearRampToValueAtTime(0, t + 0.18);
    osc.connect(g2); g2.connect(mg);
    osc.start(t); osc.stop(t + 0.20);
  });
}

/* ── wrong answer buzz ── */
function sfxWrong() {
  playTone(180, 0.18, 0.30, 'sawtooth', 0.005, 0.10);
}

/* ── time-up alarm: rapid beeps ── */
function sfxTimeUp() {
  const ctx = getAudioCtx();
  const mg  = getMasterGain();
  for (let i = 0; i < 4; i++) {
    const osc = ctx.createOscillator();
    const g2  = ctx.createGain();
    const t   = ctx.currentTime + i * 0.18;
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, t);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.40, t + 0.01);
    g2.gain.linearRampToValueAtTime(0, t + 0.14);
    osc.connect(g2); g2.connect(mg);
    osc.start(t); osc.stop(t + 0.16);
  }
}

/* ── last-10-seconds warning tick ── */
function sfxTick() {
  playTone(880, 0.06, 0.20, 'square', 0.003, 0.03);
}

/* ═══════════════════════════
   BACKGROUND LOOP (เร่งเร้า / countdown)
   16-beat ostinato pattern
═══════════════════════════ */
const BG_BPM   = 138;                    // beats per minute
const BG_BEAT  = 60 / BG_BPM;           // seconds per beat
// melody: [frequency, durationInBeats, volumeScale]  (0 = rest)
const BG_MELODY = [
  [659,0.5,1],[0,0.5],[587,0.5,0.75],[0,0.5],
  [523,0.5,0.9],[523,0.5,0.6],[587,1,0.85],[0,0.5],[0,0.5],
  [659,0.5,1],[698,0.5,0.9],[659,0.5,0.8],[587,0.5,0.7],
  [523,2,1],[0,0.5],[0,0.5],
];
// bass pulse: plays on every beat index that is even
const BG_BASS = [130, 130, 146, 146, 174, 174, 146, 146];

let bgScheduleTimer = null;
let bgNextBeat = 0;
let bgBeatIdx  = 0;
let bgMelodyPos = 0;
let bgBeatsUntilNextMelody = 0;

function bgSchedule() {
  if (!bgLoopRunning) return;
  const ctx = getAudioCtx();
  const mg  = getMasterGain();
  const LOOK_AHEAD = 0.12;   // seconds ahead to schedule

  while (bgNextBeat < ctx.currentTime + LOOK_AHEAD) {
    const t = bgNextBeat;

    // bass pulse (every beat)
    const bassFreq = BG_BASS[bgBeatIdx % BG_BASS.length];
    const bassOsc  = ctx.createOscillator();
    const bassG    = ctx.createGain();
    bassOsc.type   = 'sawtooth';
    bassOsc.frequency.setValueAtTime(bassFreq, t);
    bassG.gain.setValueAtTime(0, t);
    bassG.gain.linearRampToValueAtTime(0.14, t + 0.01);
    bassG.gain.exponentialRampToValueAtTime(0.001, t + BG_BEAT * 0.8);
    bassOsc.connect(bassG); bassG.connect(mg);
    bassOsc.start(t); bassOsc.stop(t + BG_BEAT);

    // hi-hat (every half-beat via subdivide)
    for (let sub = 0; sub < 2; sub++) {
      const ht = t + sub * BG_BEAT * 0.5;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = (Math.random()*2-1);
      const src = ctx.createBufferSource();
      const hg  = ctx.createGain();
      src.buffer = buf;
      hg.gain.setValueAtTime(sub===0 ? 0.07 : 0.035, ht);
      hg.gain.exponentialRampToValueAtTime(0.001, ht + 0.035);
      src.connect(hg); hg.connect(mg);
      src.start(ht);
    }

    // melody note (track when next note fires)
    if (bgBeatsUntilNextMelody <= 0) {
      const note = BG_MELODY[bgMelodyPos % BG_MELODY.length];
      const [mFreq, mBeats, mVol] = note;
      if (mFreq > 0) {
        const mOsc = ctx.createOscillator();
        const mG   = ctx.createGain();
        mOsc.type  = 'square';
        mOsc.frequency.setValueAtTime(mFreq, t);
        mG.gain.setValueAtTime(0, t);
        mG.gain.linearRampToValueAtTime((mVol||1) * 0.18, t + 0.012);
        mG.gain.setValueAtTime((mVol||1) * 0.18, t + BG_BEAT * mBeats - 0.05);
        mG.gain.linearRampToValueAtTime(0, t + BG_BEAT * mBeats);
        mOsc.connect(mG); mG.connect(mg);
        mOsc.start(t); mOsc.stop(t + BG_BEAT * mBeats + 0.01);
      }
      bgBeatsUntilNextMelody = mBeats;
      bgMelodyPos++;
    }
    bgBeatsUntilNextMelody--;

    bgBeatIdx++;
    bgNextBeat += BG_BEAT;
  }
  bgScheduleTimer = setTimeout(bgSchedule, 50);
}

function bgStart() {
  if (bgLoopRunning) return;
  bgLoopRunning = true;
  bgBeatIdx  = 0;
  bgMelodyPos = 0;
  bgBeatsUntilNextMelody = 0;
  bgNextBeat = getAudioCtx().currentTime + 0.05;
  bgSchedule();
}

function bgStop() {
  bgLoopRunning = false;
  clearTimeout(bgScheduleTimer);
}

/* ── mute toggle ── */
let audioMuted = false;
function toggleMute() {
  audioMuted = !audioMuted;
  if (masterGain) masterGain.gain.value = audioMuted ? 0 : 0.55;
  document.getElementById('muteBtn').textContent = audioMuted ? '🔇' : '🔊';
}

function cdToggle() {
  if (timerTotal === 0) return;
  if (!cdRunning) cdStart(); else cdStop();
}

function cdStart() {
  if (timerTotal === 0) return;
  if (timeLeft <= 0) timeLeft = timerTotal; // restart if finished
  cdRunning = true;
  cdPlayBtn.className = 'cd-playbtn running';
  cdPlayBtn.textContent = '⏸ หยุด';
  resetScore();
  sfxStart();
  bgStart();
  cdInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      timeLeft = 0;
      updateCdDisplay();
      cdStop();
      onTimeUp();
      return;
    }
    // last-10-seconds warning ticks
    if (timeLeft <= 10) sfxTick();
    updateCdDisplay();
  }, 1000);
  updateCdDisplay();
}

function cdStop() {
  cdRunning = false;
  clearInterval(cdInterval);
  bgStop();
  if (timerTotal > 0) {
    cdPlayBtn.className = 'cd-playbtn';
    cdPlayBtn.textContent = timeLeft<=0 ? '↺ เริ่มใหม่' : '▶ เริ่ม';
    if (timeLeft > 0) sfxStop();
  }
}

function updateCdDisplay() {
  cdTimeEl.textContent = fmtMMSS(timeLeft);
  const ratio = timeLeft / timerTotal;
  cdBar.style.width = (ratio*100) + '%';
  cdBar.className = 'cd-bar' + (ratio<=0.15?' danger':ratio<=0.4?' warn':'');
  cdTimeEl.className = 'cd-time' + (ratio<=0.15?' danger':'');
}

function onTimeUp() {
  bgStop();
  sfxTimeUp();
  document.getElementById('leftCol').classList.add('timeup-pulse');
  setTimeout(()=>document.getElementById('leftCol').classList.remove('timeup-pulse'), 1300);
  if (qMode === 'B' && !batchDone) {
    batchDone = true;
    renderSheet();
    showSummary('timeup');
  } else if (qMode === 'A' && !answered) {
    // reveal current answer, lock further input
    answered = true;
    const right = currentQ ? currentQ.right : a + b;
    answerText.textContent = right;
    answerText.style.color = 'var(--accent2)';
    answerText.classList.add('visible');
    answerPH.style.display = 'none';
    resultBadge.className = 'result-badge wrong';
    resultBadge.textContent = '⏰ หมดเวลา!';
    if (streak > 0) recordSingleStreak(streak, true);
    streak = 0;
    streakEl.textContent = '';
  } else if (qMode === 'C' && !cAnswered) {
    cAnswered = true;
    choiceBtns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === cCorrectIdx) btn.classList.add('choice-correct');
      else btn.classList.add('choice-dim');
    });
    resultBadgeC.className = 'result-badge wrong';
    resultBadgeC.textContent = '⏰ หมดเวลา!';
    if (cStreak > 0) recordChoiceStreak(cStreak, true);
    cStreak = 0;
    streakCEl.textContent = '';
  }
}

/* ═══════════════════════════════════════
   PLAYER PROFILES
═══════════════════════════════════════ */
const PLAYERS_KEY = 'mathgame_players_v1';
const ACTIVE_KEY  = 'mathgame_active_player_v1';

// palette for avatars
const PLAYER_COLORS = [
  {bg:'rgba(247,201,72,.22)',  fg:'#f7c948'},
  {bg:'rgba(67,233,123,.22)', fg:'#43e97b'},
  {bg:'rgba(94,184,255,.22)', fg:'#5eb8ff'},
  {bg:'rgba(192,132,252,.22)',fg:'#c084fc'},
  {bg:'rgba(255,107,107,.22)',fg:'#ff6b6b'},
  {bg:'rgba(251,146,60,.22)', fg:'#fb923c'},
];

function loadPlayers() {
  try { const r = localStorage.getItem(PLAYERS_KEY); return r ? JSON.parse(r) : []; }
  catch(e) { return []; }
}
function savePlayers(p) {
  try { localStorage.setItem(PLAYERS_KEY, JSON.stringify(p)); } catch(e) {}
}
function getActivePlayerId() {
  try { return localStorage.getItem(ACTIVE_KEY) || null; } catch(e) { return null; }
}
function setActivePlayerId(id) {
  try { if (id) localStorage.setItem(ACTIVE_KEY, id); else localStorage.removeItem(ACTIVE_KEY); } catch(e) {}
}

let activePlayerId = null;  // null = no player selected
let playerFilter   = null;  // null = all players

function initPlayers() {
  activePlayerId = getActivePlayerId();
  updateHeaderChip();
}

function updateHeaderChip() {
  const players = loadPlayers();
  const p = players.find(x => x.id === activePlayerId);
  const avatarEl = document.getElementById('headerAvatar');
  const nameEl   = document.getElementById('headerName');
  if (p) {
    const col = PLAYER_COLORS[p.colorIdx % PLAYER_COLORS.length];
    avatarEl.style.background = col.bg;
    avatarEl.style.color = col.fg;
    avatarEl.textContent = p.name.charAt(0).toUpperCase();
    nameEl.textContent = p.name;
  } else {
    avatarEl.style.background = 'rgba(94,184,255,0.15)';
    avatarEl.style.color = 'var(--blue)';
    avatarEl.textContent = '?';
    nameEl.textContent = 'เลือกผู้เล่น';
  }
}

function showAddPlayer() {
  const row = document.getElementById('addPlayerRow');
  row.style.display = row.style.display === 'none' ? '' : 'none';
  if (row.style.display !== 'none') document.getElementById('newPlayerInput').focus();
}

function addPlayer() {
  const input = document.getElementById('newPlayerInput');
  const name = input.value.trim();
  if (!name) return;
  const players = loadPlayers();
  if (players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    input.value = ''; return;
  }
  const id = 'p_' + Date.now();
  players.push({ id, name, colorIdx: players.length });
  savePlayers(players);
  // auto-select if first player
  if (players.length === 1) {
    activePlayerId = id;
    setActivePlayerId(id);
    updateHeaderChip();
  }
  input.value = '';
  document.getElementById('addPlayerRow').style.display = 'none';
  renderPlayerPanel();
  renderStats();
}

function selectPlayer(id) {
  activePlayerId = id;
  setActivePlayerId(id);
  updateHeaderChip();
  renderPlayerPanel();
  renderStats();
}

function deletePlayer(id) {
  let players = loadPlayers();
  players = players.filter(p => p.id !== id);
  savePlayers(players);
  if (activePlayerId === id) {
    activePlayerId = players[0]?.id || null;
    setActivePlayerId(activePlayerId);
    updateHeaderChip();
  }
  if (playerFilter === id) playerFilter = null;
  renderPlayerPanel();
  renderStats();
}

function renderPlayerPanel() {
  const players = loadPlayers();
  const list = document.getElementById('playerList');
  if (players.length === 0) {
    list.innerHTML = '<span style="font-size:12px;color:var(--muted)">ยังไม่มีผู้เล่น กด + เพิ่มผู้เล่นก่อน</span>';
    return;
  }
  list.innerHTML = '';
  players.forEach(p => {
    const col = PLAYER_COLORS[p.colorIdx % PLAYER_COLORS.length];
    const tag = document.createElement('div');
    tag.className = 'player-tag' + (p.id === activePlayerId ? ' active-player' : '');
    tag.onclick = () => selectPlayer(p.id);
    tag.innerHTML = `
      <div class="pt-avatar" style="background:${col.bg};color:${col.fg}">${p.name.charAt(0).toUpperCase()}</div>
      <span class="pt-name">${p.name}</span>
      <button class="pt-del" onclick="event.stopPropagation();deletePlayer('${p.id}')" title="ลบ">✕</button>
    `;
    list.appendChild(tag);
  });
}

function renderPlayerFilter() {
  const players = loadPlayers();
  const row = document.getElementById('playerFilterRow');
  if (players.length === 0) { row.innerHTML = ''; return; }
  row.innerHTML = '<span class="pf-label">แสดงของ:</span>';
  // "ทุกคน" button
  const all = document.createElement('button');
  all.className = 'pf-btn' + (!playerFilter ? ' active-pf' : '');
  all.textContent = 'ทุกคน';
  all.onclick = () => { playerFilter = null; renderPlayerFilter(); renderStats(); };
  row.appendChild(all);
  players.forEach(p => {
    const col = PLAYER_COLORS[p.colorIdx % PLAYER_COLORS.length];
    const btn = document.createElement('button');
    btn.className = 'pf-btn' + (playerFilter === p.id ? ' active-pf' : '');
    btn.style.borderColor = playerFilter === p.id ? col.fg : '';
    btn.style.color = playerFilter === p.id ? col.fg : '';
    btn.style.background = playerFilter === p.id ? col.bg : '';
    btn.textContent = p.name;
    btn.onclick = () => { playerFilter = p.id; renderPlayerFilter(); renderStats(); };
    row.appendChild(btn);
  });
}

/* ═══════════════════════════════════════
   STATS / RECORDS  (persisted via localStorage,
   with in-memory fallback if storage is blocked —
   e.g. some sandboxed iPad webviews / private mode / file:// access)
═══════════════════════════════════════ */
const STATS_KEY = 'mathgame_records_v1';
let storageAvailable = true;
let memRecords = [];   // fallback store, lost on reload if storage is blocked

function testStorage() {
  try {
    localStorage.setItem('__test__', '1');
    localStorage.removeItem('__test__');
    return true;
  } catch (e) { return false; }
}
storageAvailable = testStorage();

function loadRecords() {
  if (!storageAvailable) return memRecords;
  try {
    const raw = localStorage.getItem(STATS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return memRecords; }
}
function saveRecords(records) {
  if (!storageAvailable) { memRecords = records; return; }
  try {
    localStorage.setItem(STATS_KEY, JSON.stringify(records));
  } catch (e) {
    memRecords = records;
    storageAvailable = false;
  }
}

function recordSingleStreak(streakVal, ended) {
  if (!ended || streakVal < 1) return;
  const records = loadRecords();
  records.push({
    type: 'single',
    difficulty: difficulty,
    streak: streakVal,
    timed: timerTotal > 0,
    playerId: activePlayerId,
    date: new Date().toISOString()
  });
  saveRecords(records);
}

function recordBatchResult(r) {
  const records = loadRecords();
  records.push({
    type: 'batch',
    difficulty: difficulty,
    correct: r.correct,
    wrong: r.wrong,
    total: r.total,
    timed: r.timed,
    timeUsed: r.timeUsed,
    timerTotal: r.timerTotal,
    extended: r.extended,
    playerId: activePlayerId,
    date: new Date().toISOString()
  });
  saveRecords(records);
}

let statsFilter = 'all';

function openStats() {
  document.getElementById('statsOverlay').classList.add('visible');
  renderPlayerPanel();
  renderPlayerFilter();
  renderStats();
}
function closeStats() {
  document.getElementById('statsOverlay').classList.remove('visible');
  hideConfirmBox();
}
function setStatsFilter(f) {
  statsFilter = f;
  document.querySelectorAll('.stats-tab').forEach(b => b.classList.toggle('on-stat', b.dataset.stat === f));
  renderStats();
}

/* in-app confirm dialog (native confirm() is blocked in some iPad webviews) */
function askClearStats() {
  const textEl = document.querySelector('.confirm-text');
  if (playerFilter) {
    const players = loadPlayers();
    const p = players.find(x => x.id === playerFilter);
    textEl.innerHTML = `ล้างสถิติของ <b>${p ? p.name : 'ผู้เล่นนี้'}</b>?<br><span>การกระทำนี้ไม่สามารถย้อนกลับได้</span>`;
  } else {
    textEl.innerHTML = `ล้างสถิติทั้งหมด?<br><span>การกระทำนี้ไม่สามารถย้อนกลับได้</span>`;
  }
  document.getElementById('confirmBox').classList.add('visible');
}
function hideConfirmBox() {
  document.getElementById('confirmBox').classList.remove('visible');
}
function doClearStats() {
  if (playerFilter) {
    // only delete records belonging to the filtered player
    const records = loadRecords().filter(r => r.playerId !== playerFilter);
    saveRecords(records);
  } else {
    saveRecords([]);
  }
  hideConfirmBox();
  renderStats();
}
function deleteRecord(idx) {
  const records = loadRecords();
  records.splice(idx, 1);
  saveRecords(records);
  renderStats();
}

function matchesFilter(rec) {
  if (statsFilter === 'all') return true;
  const [type, diff] = statsFilter.split('-');
  const typeMatch = (type === 'single' && rec.type === 'single') ||
                     (type === 'batch'  && rec.type === 'batch')  ||
                     (type === 'choice' && rec.type === 'choice');
  return typeMatch && rec.difficulty === diff;
}

function diffLabel(d) { return d === 'hard' ? '🔥 ยาก' : '😊 ปกติ'; }
function typeLabel(rec) {
  if (rec.type === 'single') return '🎯 ทีละข้อ';
  if (rec.type === 'choice') return '🔘 เลือกตอบ';
  return rec.extended ? '📋 ไม่จำกัดข้อ' : '📋 10 ข้อ';
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('th-TH', {day:'numeric', month:'short'}) + ' ' +
         d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
}

function matchesPlayerFilter(rec) {
  if (!playerFilter) return true;
  return rec.playerId === playerFilter;
}

function renderStats() {
  const players = loadPlayers();
  const playerMap = Object.fromEntries(players.map(p => [p.id, p]));

  const allRecords = loadRecords();
  // base pool: type filter + player filter
  const basePool = allRecords.filter(r => matchesFilter(r) && matchesPlayerFilter(r));

  const body        = document.getElementById('statsBody');
  const summaryRow  = document.getElementById('statsSummaryRow');

  // summary cards: scoped to player filter if set, else global
  const scopedAll = playerFilter ? allRecords.filter(r => r.playerId === playerFilter) : allRecords;
  const bestStreak    = scopedAll.filter(r=>r.type==='single'||r.type==='choice').reduce((m,r)=>Math.max(m,r.streak||0), 0);
  const bestBatchAcc  = scopedAll.filter(r=>r.type==='batch'&&r.total>0).reduce((m,r)=>Math.max(m,Math.round(r.correct/r.total*100)), 0);
  const totalPlays    = scopedAll.length;
  const scopeLabel    = playerFilter && playerMap[playerFilter] ? playerMap[playerFilter].name : '';

  summaryRow.innerHTML = `
    <div class="stats-sumcard"><div class="sc-label">สถิติสูงสุด ติดกัน</div><div class="sc-value gold">${bestStreak}</div></div>
    <div class="stats-sumcard"><div class="sc-label">ความแม่นยำสูงสุด</div><div class="sc-value green">${bestBatchAcc}%</div></div>
    <div class="stats-sumcard"><div class="sc-label">${scopeLabel ? scopeLabel+' เล่นไป' : 'เล่นไปแล้ว'}</div><div class="sc-value blue">${totalPlays}</div></div>
  `;

  if (basePool.length === 0) {
    body.innerHTML = '<div class="stats-empty">ยังไม่มีสถิติในหมวดนี้<br>เล่นเกมเพื่อบันทึกผลของคุณ!</div>';
    return;
  }

  const withIdx = allRecords.map((r,i)=>({...r,_origIdx:i})).filter(r=>matchesFilter(r)&&matchesPlayerFilter(r));
  const sorted  = withIdx.slice().sort((x,y)=>new Date(y.date)-new Date(x.date));

  const bestStreakInFilter = Math.max(0, ...sorted.filter(r=>r.type==='single'||r.type==='choice').map(r=>r.streak||0));
  const bestAccInFilter    = Math.max(0, ...sorted.filter(r=>r.type==='batch'&&r.total>0).map(r=>Math.round(r.correct/r.total*100)));

  body.innerHTML = '';
  sorted.forEach(rec => {
    const p   = rec.playerId ? playerMap[rec.playerId] : null;
    const col = p ? PLAYER_COLORS[p.colorIdx % PLAYER_COLORS.length] : null;
    let isBest = false, resultMain = '', resultSub = '';

    if (rec.type === 'single' || rec.type === 'choice') {
      isBest      = rec.streak === bestStreakInFilter && bestStreakInFilter > 0;
      resultMain  = `🔥 ${rec.streak}`;
      resultSub   = 'ครั้งติด';
    } else {
      const acc   = rec.total > 0 ? Math.round(rec.correct/rec.total*100) : 0;
      isBest      = acc === bestAccInFilter && bestAccInFilter > 0 && rec.total >= 5;
      resultMain  = `${rec.correct}/${rec.total}`;
      resultSub   = `${acc}%${rec.timeUsed!=null?' · '+fmtMMSS(rec.timeUsed):''}`;
    }

    const playerBadge = p
      ? `<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:${col.bg};color:${col.fg};margin-left:4px">${p.name}</span>`
      : '';

    const row = document.createElement('div');
    row.className = 'stat-row' + (isBest ? ' is-best' : '');
    row.innerHTML = `
      <div class="stat-badge">${isBest ? '🏆' : (rec.type==='batch'?'📋':(rec.type==='choice'?'🔘':'🎯'))}</div>
      <div class="stat-meta">
        <div class="meta-main">${typeLabel(rec)} · ${diffLabel(rec.difficulty)}${rec.timed?' · ⏱':''} ${playerBadge}</div>
        <div class="meta-sub">${fmtDate(rec.date)}</div>
      </div>
      <div class="stat-result">
        <div class="res-main ${isBest?'gold':'green'}">${resultMain}</div>
        <div class="res-sub">${resultSub}</div>
      </div>
      <button class="stat-del" onclick="deleteRecord(${rec._origIdx})">✕</button>
    `;
    body.appendChild(row);
  });
}

initPlayers();
generate();
